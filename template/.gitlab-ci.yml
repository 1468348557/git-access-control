stages:
  - gate
  - approve

variables:
  GIT_DEPTH: "0"
  GATE_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.spdb.com/zh-1087/hobo-git-gate.git"

gate:
  stage: gate
  tags:
    - shell
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE"
    - echo "CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME"
    - echo "CI_MERGE_REQUEST_SOURCE_BRANCH_NAME=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
    - echo "CI_MERGE_REQUEST_TARGET_BRANCH_NAME=$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - git clone --depth 1 ${GATE_REPO} /tmp/gate 2>/dev/null || git clone --depth 1 "https://gitlab.spdb.com/zh-1087/hobo-git-gate.git" /tmp/gate
    - chmod +x /tmp/gate/scripts/git_gate.sh
    - /tmp/gate/scripts/git_gate.sh
  artifacts:
    paths:
      - approval_status
    expire_in: 1h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

approval:
  stage: approve
  tags:
    - shell
  needs:
    - git_gate
  script:
    - git clone --depth 1 ${GATE_REPO} /tmp/gate 2>/dev/null || git clone --depth 1 "https://gitlab.spdb.com/zh-1087/hobo-git-gate.git" /tmp/gate
    - chmod +x /tmp/gate/scripts/approval.sh
    - /tmp/gate/scripts/approval.sh
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
