stages:
  - gate
  - approve

variables:
  GIT_DEPTH: "0"

.download_scripts: &download_scripts
  - mkdir -p /tmp/gate/scripts
  - curl -sS -o /tmp/gate/scripts/git_gate.sh "${GATE_URL}/scripts/git_gate.sh"
  - curl -sS -o /tmp/gate/scripts/approval.sh "${GATE_URL}/scripts/approval.sh"
  - chmod +x /tmp/gate/scripts/git_gate.sh /tmp/gate/scripts/approval.sh

gate:
  stage: gate
  tags:
    - shell
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE"
    - echo "CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME"
    - echo "CI_MERGE_REQUEST_SOURCE_BRANCH_NAME=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
    - echo "CI_MERGE_REQUEST_TARGET_BRANCH_NAME=$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - *download_scripts
    - /tmp/gate/scripts/git_gate.sh
  artifacts:
    paths:
      - approval_status
    expire_in: 1h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

approval:
  stage: approve
  tags:
    - shell
  needs:
    - gate
  script:
    - *download_scripts
    - /tmp/gate/scripts/approval.sh
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
